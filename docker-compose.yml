services:
  postgres:
    image: postgres:16-alpine
    container_name: queueforge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-queueforge}
      POSTGRES_USER: ${POSTGRES_USER:-queueforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-queueforge_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-queueforge} -d ${POSTGRES_DB:-queueforge}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: queueforge-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-queueforge}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-queueforge}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-queueforge_dev_password}
      QUEUEFORGE_WORKER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: queueforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: queueforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    profiles:
      - observability

volumes:
  postgres_data:
